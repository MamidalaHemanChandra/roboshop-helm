apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    project: roboshop
    environment: {{ .Values.service.environment }}
    component: redis
    tier: db
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
spec:
  clusterIP: None
  selector:
    project: roboshop
    environment: {{ .Values.service.environment }}
    component: redis
    tier: db
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---